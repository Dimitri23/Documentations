<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#0a1e35"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Water waves -->
  <path d="M20 130 Q50 115 80 130 Q110 145 140 130 Q170 115 180 130 L180 160 Q150 175 120 160 Q90 145 60 160 Q35 170 20 160 Z" fill="url(#wave)" opacity="0.85"/>
  <path d="M20 148 Q50 133 80 148 Q110 163 140 148 Q165 136 180 148 L180 180 Q150 190 120 180 Q90 165 60 180 Q35 188 20 180 Z" fill="url(#wave)" opacity="0.55"/>

  <!-- Pool symbol: stylized droplet/sensor -->
  <ellipse cx="100" cy="72" rx="22" ry="28" fill="#4fc3f7" opacity="0.9"/>
  <path d="M78 72 Q78 54 100 40 Q122 54 122 72 Q122 90 100 95 Q78 90 78 72 Z" fill="#29b6f6"/>

  <!-- Center dot (sensor) -->
  <circle cx="100" cy="72" r="8" fill="#0d1b2a"/>
  <circle cx="100" cy="72" r="4" fill="#4fc3f7"/>

  <!-- FP text -->
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b0d4f1" text-anchor="middle" opacity="0.9">FliprPilot</text>
</svg>
