<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 590" width="190" height="295" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="gm-ok" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="gm-warn" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/></linearGradient>
    <linearGradient id="gm-neutral" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7ecfff"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="gm-bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#4ade80"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="380" height="590" rx="12" fill="#0d1b2a"/>

  <!-- ── STATUS BAR ── -->
  <rect x="14" y="14" width="106" height="24" rx="12" fill="rgba(74,222,128,0.15)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <circle cx="26" cy="26" r="3.5" fill="#4ade80"/>
  <text x="36" y="30" font-size="10" fill="#4ade80" font-weight="600">Filtration ON</text>

  <rect x="126" y="14" width="72" height="24" rx="12" fill="rgba(148,163,184,0.1)" stroke="rgba(148,163,184,0.2)" stroke-width="1"/>
  <circle cx="138" cy="26" r="3.5" fill="#475569"/>
  <text x="148" y="30" font-size="10" fill="#94a3b8" font-weight="600">PAC OFF</text>

  <rect x="204" y="14" width="76" height="24" rx="12" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="216" y="30" font-size="10" fill="#fbbf24" font-weight="600">&#9728;&#65039; Journ&#233;e</text>

  <rect x="286" y="14" width="80" height="24" rx="12" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.25)" stroke-width="1"/>
  <text x="298" y="30" font-size="10" fill="#4ade80" font-weight="600">&#128267; 72%</text>

  <!-- ── METRICS 2&#215;2 ── -->
  <!-- Temp&#233;rature -->
  <rect x="14" y="50" width="170" height="82" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="14" y="50" width="170" height="3" rx="1.5" fill="url(#gm-neutral)"/>
  <text x="24" y="67" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#127777;&#65039; TEMP. EAU</text>
  <text x="24" y="100" font-size="32" fill="#7ecfff" font-weight="700">26.4</text>
  <text x="100" y="100" font-size="14" fill="#94a3b8">&#176;C</text>
  <text x="120" y="98" font-size="14" fill="#5a8aaa">&#8594;</text>

  <!-- pH -->
  <rect x="196" y="50" width="170" height="82" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="196" y="50" width="170" height="3" rx="1.5" fill="url(#gm-ok)"/>
  <text x="206" y="67" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#9879;&#65039; PH</text>
  <text x="206" y="100" font-size="32" fill="#4ade80" font-weight="700">7.21</text>
  <text x="272" y="98" font-size="14" fill="#5a8aaa">&#8594;</text>

  <!-- Chlore -->
  <rect x="14" y="140" width="170" height="82" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="14" y="140" width="170" height="3" rx="1.5" fill="url(#gm-warn)"/>
  <text x="24" y="157" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#129514; CHLORE</text>
  <text x="24" y="190" font-size="32" fill="#fbbf24" font-weight="700">0.85</text>
  <text x="93" y="190" font-size="12" fill="#94a3b8">mg/L</text>
  <text x="140" y="188" font-size="14" fill="#38bdf8">&#8595;</text>

  <!-- Redox -->
  <rect x="196" y="140" width="170" height="82" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="196" y="140" width="170" height="3" rx="1.5" fill="url(#gm-neutral)"/>
  <text x="206" y="157" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#9889; REDOX</text>
  <text x="206" y="190" font-size="32" fill="#7ecfff" font-weight="700">680</text>
  <text x="270" y="190" font-size="12" fill="#94a3b8">mV</text>
  <text x="314" y="188" font-size="14" fill="#5a8aaa">&#8594;</text>

  <!-- ── FILTRATION BAR ── -->
  <rect x="14" y="234" width="352" height="62" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <text x="24" y="253" font-size="11" fill="#7ecfff" font-weight="700">120 min</text>
  <text x="96" y="253" font-size="11" fill="#5a8aaa">/ 240 min</text>
  <text x="352" y="253" font-size="11" fill="#4ade80" font-weight="600" text-anchor="end">50%</text>
  <rect x="24" y="260" width="322" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="24" y="260" width="161" height="8" rx="4" fill="url(#gm-bar)"/>

  <!-- ── ACTION GROUPS ── -->
  <!-- Filtration -->
  <rect x="14" y="308" width="170" height="240" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <text x="24" y="327" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#128167; FILTRATION</text>
  <rect x="24" y="334" width="150" height="40" rx="8" fill="rgba(74,222,128,0.18)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="99" y="359" font-size="13" fill="#4ade80" font-weight="600" text-anchor="middle">&#9654; ON</text>
  <rect x="24" y="382" width="150" height="40" rx="8" fill="rgba(241,98,98,0.15)" stroke="rgba(241,98,98,0.25)" stroke-width="1"/>
  <text x="99" y="407" font-size="13" fill="#f87171" font-weight="600" text-anchor="middle">&#9632; OFF</text>
  <rect x="24" y="430" width="150" height="40" rx="8" fill="rgba(126,207,255,0.12)" stroke="rgba(126,207,255,0.25)" stroke-width="1"/>
  <text x="99" y="455" font-size="12" fill="#7ecfff" font-weight="600" text-anchor="middle">&#9201; Forcer&#8230;</text>

  <!-- PAC -->
  <rect x="196" y="308" width="170" height="240" rx="10" fill="#122236" stroke="#1e3a5f" stroke-width="1"/>
  <text x="206" y="327" font-size="9" fill="#5a8aaa" font-weight="600" letter-spacing="0.6">&#127777;&#65039; PAC</text>
  <rect x="206" y="334" width="150" height="40" rx="8" fill="rgba(251,146,60,0.18)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="281" y="359" font-size="13" fill="#fb923c" font-weight="600" text-anchor="middle">&#9654; ON</text>
  <rect x="206" y="382" width="150" height="40" rx="8" fill="rgba(241,98,98,0.15)" stroke="rgba(241,98,98,0.25)" stroke-width="1"/>
  <text x="281" y="407" font-size="13" fill="#f87171" font-weight="600" text-anchor="middle">&#9632; OFF</text>
  <rect x="206" y="430" width="150" height="40" rx="8" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="281" y="455" font-size="12" fill="#fdba74" font-weight="600" text-anchor="middle">&#9201; Forcer&#8230;</text>

  <!-- ── FOOTER ── -->
  <line x1="14" y1="560" x2="366" y2="560" stroke="#1e3a5f" stroke-width="1"/>
  <text x="286" y="575" font-size="10" fill="#5a8aaa">&#128336; <tspan font-weight="600">14:32</tspan></text>
  <text x="366" y="575" font-size="10" fill="#2d5470" text-anchor="end">&#8635; 30s</text>
</svg>
